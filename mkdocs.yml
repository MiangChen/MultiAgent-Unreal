site_name: MultiAgent-Unreal 文档
site_description: MultiAgent-Unreal 外部使用与集成文档
site_url: https://miangchen.github.io/MultiAgent-Unreal/
repo_name: MiangChen/MultiAgent-Unreal
repo_url: https://github.com/MiangChen/MultiAgent-Unreal

# 使用独立目录，避免与仓库现有 docs/ 内部文档混杂
# (同仓库管理，适配 GitHub Pages)
docs_dir: site_docs

nav:
  - 功能性介绍: index.md
  - ⌨️ 按键说明: keybindings.md
  - 启动与 Example: startup-and-examples.md
  - API 参考: api-reference.md

theme:
  name: material
  language: zh
  features:
    - navigation.sections
    - navigation.expand
    - toc.follow
    - content.code.copy
  palette:
    - scheme: default
      primary: blue grey
      accent: cyan

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight
