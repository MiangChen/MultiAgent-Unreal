# =============================================================================
# UnrealZoo Configuration Parameters
# =============================================================================

# UE Binary 绝对路径
ue_binary_path: "/home/ubuntu/UnrealEnv/UnrealZoo_UE5_5_Linux_v1.0.5/Linux/UnrealZoo_UE5_5/Binaries/Linux/UnrealZoo_UE5_5"

# 环境设置
env:
  map: "Grass_Hills"         # UE 地图名 (用于 set_map)
  agent_config: "multi_drone.json"  # Agent 配置文件 (必填，包含 .json 后缀)
                                   # 完整路径: config/agent_config/{agent_config}
  action_type: "Continuous"  # 动作类型: Continuous / Discrete
  observation_type: "Color"  # 观测类型: Color / Depth / Mask

# 渲染设置
rendering:
  resolution: [640, 480]
  offscreen: false

# 仿真设置
simulation:
  time_dilation: 10
  max_episode_steps: 500
